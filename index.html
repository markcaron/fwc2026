<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Interactive FIFA World Cup 2026 schedule — match times in your timezone, live scores, group standings, and knockout bracket." />
    <meta name="theme-color" content="#0a1b2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#163660" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WC 2026 — Schedule &amp; Standings</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <link rel="apple-touch-icon" href="/public/apple-touch-icon.png" />
    <link rel="manifest" href="/public/manifest.json" />
    <link rel="stylesheet" href="/src/tokens.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--fwc-bg-body);
        color: var(--fwc-text);
        min-height: 100dvh;
        overscroll-behavior: none;
        /* Center the app on wide screens */
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
      fwc-app {
        width: 100%;
        max-width: 900px;
        /* No side borders — open, clean feel */
      }
    </style>
  </head>
  <body>
    <fwc-app></fwc-app>
    <script type="module" src="/src/index.ts"></script>
    <script>
      /**
       * Service Worker registration + auto-refresh on update.
       *
       * How it works:
       * 1. Browser fetches /sw.js. If it's byte-different from the cached
       *    version (it will be — build.mjs injects a new hash each deploy),
       *    it installs the new SW.
       * 2. The new SW calls skipWaiting() so it advances past the waiting
       *    phase immediately (no need to close other tabs).
       * 3. clients.claim() in the activate handler takes control of all open
       *    clients — this is what fires 'controllerchange' on this page.
       * 4. We check previousController: if this is a brand-new visitor
       *    (no previous SW controller), we skip the reload — without this
       *    guard every first-time visitor would get a spurious reload.
       * 5. refreshing flag prevents a double-reload edge case.
       */
      if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
        const previousController = navigator.serviceWorker.controller;
        let refreshing = false;

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!previousController || refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // SW registration failed (e.g. browser restrictions). Silently ignore.
          });
        });
      }
    </script>
  </body>
</html>
