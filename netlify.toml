[build]
  publish = "dist"
  command = "npm run build"

# ── Environment variables ────────────────────────────────────────────────────
# Set FOOTBALL_DATA_API_KEY in the Netlify dashboard under
# Site → Environment Variables. Free tier at:
#   https://www.football-data.org/client/register
# The scheduled function (netlify/functions/fetch-scores.mts) uses this key.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/bundle.js"
  [headers.values]
    Content-Type = "text/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/src/tokens.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service worker must never be cached by the browser — it needs to be
# re-fetched on every visit so the browser can detect new versions.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

[[headers]]
  for = "/public/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
